
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bio-Shield | Tactical Overlay</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00eaff; --alert: #ff3b3b; --bg: #030712; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Orbitron', monospace; display: flex; flex-direction: column; height: 100vh; padding: 20px; overflow: hidden; }
        #terminal { flex-grow: 1; background: rgba(0,234,255,0.05); border: 1px solid rgba(0,234,255,0.1); padding: 15px; font-size: 12px; overflow-y: hidden; margin: 10px 0; font-family: monospace; }
        .log-entry { margin-bottom: 5px; opacity: 0.8; border-left: 2px solid var(--neon); padding-left: 8px; }
        .crit { color: var(--alert); border-color: var(--alert); }
        .bar-bg { height: 10px; background: #111; border: 1px solid #333; margin: 10px 0; }
        #bar-fill { height: 100%; width: 100%; background: var(--neon); transition: width 0.5s; }
        button { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 10px; cursor: pointer; font-family: 'Orbitron'; margin-bottom: 5px; width: 100%; font-size: 10px; }
        button:hover { background: var(--neon); color: black; }
        .panic { border-color: var(--alert); color: var(--alert); }
        #timer-box { font-size: 18px; color: var(--alert); text-align: right; display: none; }
        #lock-screen { background: rgba(255,0,0,0.1); padding: 10px; border: 1px solid var(--alert); display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between;">
        <span style="font-size:10px;">TACTICAL MONITOR v6.0</span>
        <div id="timer-box">SHUTDOWN: <span id="cd">15</span>s</div>
    </div>
    <div class="bar-bg"><div id="bar-fill"></div></div>
    <div id="terminal"></div>
    <div id="lock-screen">PIN: <input type="password" id="pin" style="background:black; color:white; border:1px solid var(--alert); width: 50px;"> <button onclick="unlock()" style="width:auto;">AUTH</button></div>
    <button onclick="triggerLock()">LOCK HUB</button>
    <button onclick="triggerCorrupt()">INJECT CORRUPTION</button>
    <button onclick="toggleThermal()">TOGGLE THERMAL MAP</button>
    <button onclick="pulseAlignment()">PULSE ALIGNMENT</button>
    <button onclick="exportLogs()" style="border-color: #444; color: #777;">EXPORT LOGS</button>
    <button class="panic" onclick="sendPanic()">CRITICAL SHUTDOWN</button>
<script>
    const chan = new BroadcastChannel('bio_shield_link');
    let audioCtx, osc, gain, timer, timeLeft = 15, thermalActive = true;
    function addLog(t, type='') { const e = document.createElement('div'); e.className = `log-entry ${type}`; e.innerText = `[${new Date().toLocaleTimeString()}] ${t}`; document.getElementById('terminal').prepend(e); }
    function initAudio() { if (audioCtx) return; audioCtx = new AudioContext(); osc = audioCtx.createOscillator(); gain = audioCtx.createGain(); osc.type = 'sawtooth'; gain.gain.value = 0; osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); }
    function triggerLock() { addLog("REMOTE LOCK ENGAGED", "crit"); document.getElementById('lock-screen').style.display='block'; chan.postMessage({ mode: 'LOCK_UI' }); }
    function unlock() { if(document.getElementById('pin').value === '1234') { addLog("ACCESS GRANTED"); document.getElementById('lock-screen').style.display='none'; chan.postMessage({ mode: 'UNLOCK_UI' }); } }
    function triggerCorrupt() { chan.postMessage({ mode: 'corrupt' }); startTimer(); }
    function toggleThermal() { thermalActive = !thermalActive; chan.postMessage({ mode: 'TOGGLE_THERMAL', value: thermalActive }); addLog(`THERMAL: ${thermalActive?'ON':'OFF'}`); }
    function pulseAlignment() { chan.postMessage({ mode: 'PULSE_GHOST' }); }
    function sendPanic() { chan.postMessage({ mode: 'PANIC_KILL' }); addLog("KILL SIGNAL SENT", "crit"); stopTimer(); }
    function startTimer() { timeLeft = 15; document.getElementById('timer-box').style.display='block'; if(timer) clearInterval(timer); timer = setInterval(() => { timeLeft--; document.getElementById('cd').innerText = timeLeft; chan.postMessage({ mode: 'GLITCH_UPDATE', value: (15-timeLeft)/15 }); if(gain) { gain.gain.setTargetAtTime(0.05, audioCtx.currentTime, 0.1); osc.frequency.setTargetAtTime(440 + (15-timeLeft)*40, audioCtx.currentTime, 0.1); } if(timeLeft <= 0) { sendPanic(); } }, 1000); }
    function stopTimer() { clearInterval(timer); document.getElementById('timer-box').style.display='none'; if(gain) gain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); }
    chan.onmessage = (e) => { if(e.data.mode==='LOG') addLog(e.data.msg, e.data.type); if(e.data.mode==='corrupt') { addLog("GEOMETRY DRIFT DETECTED", "crit"); document.getElementById('bar-fill').style.width="20%"; } if(e.data.mode==='nominal') { addLog("SYSTEM NOMINAL"); document.getElementById('bar-fill').style.width="100%"; stopTimer(); } };
    function exportLogs() { const text = Array.from(document.querySelectorAll('.log-entry')).reverse().map(e => e.innerText).join('\n'); const blob = new Blob([text], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'BioShield_Log.txt'; a.click(); }
    document.body.addEventListener('click', initAudio, {once:true});
</script>
</body>
</html>
